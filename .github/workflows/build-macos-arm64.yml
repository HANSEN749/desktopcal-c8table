name: Build macOS arm64 DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-macos-arm64:
    name: macOS arm64 DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build shared and web
        run: |
          npm --workspace @desktopcal/shared run build
          npm --workspace @desktopcal/web run build

      - name: Build Tauri DMG
        run: npm --workspace @desktopcal/desktop run tauri -- build --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopCal-macos-arm64-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
